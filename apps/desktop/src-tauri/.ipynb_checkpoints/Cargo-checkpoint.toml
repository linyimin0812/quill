[package]
name = "quill"
version = "0.1.0"
description = "Quill — AI-enhanced local-first Markdown editor"
authors = ["Quill Team"]
edition = "2021"

[lib]
name = "quill_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
